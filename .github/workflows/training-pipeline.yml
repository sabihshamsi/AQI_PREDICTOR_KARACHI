name: Daily Training Pipeline

on:
  schedule:
    - cron: "0 2 * * *"  # Every day at 02:00 UTC — training only
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train and register model
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
          FEATURE_GROUP_NAME: ${{ secrets.FEATURE_GROUP_NAME || 'karachi_aqi_features' }}
          FEATURE_GROUP_VERSION: ${{ secrets.FEATURE_GROUP_VERSION || '2' }}
          FEATURE_GROUP_PRIMARY_KEY: ${{ secrets.FEATURE_GROUP_PRIMARY_KEY || 'date' }}
          TARGET_COLUMN: ${{ secrets.TARGET_COLUMN || 'pm2_5' }}
          MODEL_NAME: ${{ secrets.MODEL_NAME || 'karachi_aqi_model' }}
          MODEL_VERSION: ${{ secrets.MODEL_VERSION || '1' }}
        run: python scripts/train_model.py