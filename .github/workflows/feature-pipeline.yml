name: Hourly AQI Feature Sync

on:
  schedule:
    - cron: "0 * * * *"  # Every hour — feature sync only
  workflow_dispatch:

jobs:
  sync-features:
    runs-on: ubuntu-latest
    env:
      HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
      HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
      FEATURE_GROUP_NAME: ${{ secrets.FEATURE_GROUP_NAME || 'karachi_aqi_features' }}
      FEATURE_GROUP_VERSION: ${{ secrets.FEATURE_GROUP_VERSION || '2' }}
      FEATURE_GROUP_PRIMARY_KEY: ${{ secrets.FEATURE_GROUP_PRIMARY_KEY || 'date' }}
      TARGET_COLUMN: ${{ secrets.TARGET_COLUMN || 'pm2_5' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Display scheduled run info
        run: |
          echo "RUNNING FEATURE PIPELINE (hourly sync only)"
          echo "START_DATE=$(TZ=Asia/Karachi date -d '3 days ago' +%F)"
          echo "END_DATE=$(TZ=Asia/Karachi date +%F)"
          date -u

      - name: Backfill latest Karachi AQI window
        run: |
          START_DATE=$(TZ=Asia/Karachi date -d "3 days ago" +%F)
          END_DATE=$(TZ=Asia/Karachi date +%F)
          python scripts/backfill_features.py --start-date "$START_DATE" --end-date "$END_DATE"