name: Hourly AQI Feature Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync-features:
    runs-on: ubuntu-latest

    env:
      HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
      HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
      FEATURE_GROUP_NAME: ${{ secrets.FEATURE_GROUP_NAME || 'karachi_aqi_features' }}
      FEATURE_GROUP_VERSION: ${{ secrets.FEATURE_GROUP_VERSION || '60' }}
      FEATURE_GROUP_PRIMARY_KEY: ${{ secrets.FEATURE_GROUP_PRIMARY_KEY || 'date' }}
      TARGET_COLUMN: ${{ secrets.TARGET_COLUMN || 'pm2_5' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update Features
        run: |
          START_DATE=$(TZ=Asia/Karachi date -d "3 days ago" +%F)
          END_DATE=$(TZ=Asia/Karachi date +%F)

          python scripts/backfill_features.py \
            --start-date "$START_DATE" \
            --end-date "$END_DATE"